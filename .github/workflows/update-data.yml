name: Update Voting Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore raw data cache
        uses: actions/cache@v4
        with:
          path: data/raw
          key: congress-raw-${{ github.run_id }}
          restore-keys: congress-raw-

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pdfplumber google-genai

      - name: Run National scraper
        run: python scripts/scraper.py

      - name: Run National transformer
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY not found, running with --skip-ai"
            python scripts/transform.py --skip-ai
          else
            python scripts/transform.py
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Andalusia update
        run: python scripts/andalucia/run_update.py

      - name: Run CyL update
        run: python scripts/cyl/run_update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ data/cache_categorias.json data/andalucia/cache_categorias.json public/data/ambitos.json
          git diff --staged --quiet || git commit -m "chore: update voting data (National + Andalusia + CyL) $(date +%Y-%m-%d)"
          git push
