name: Update Voting Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch:
    inputs:
      full_history:
        description: "Si true, fuerza scraping histórico completo (más lento)."
        required: false
        type: boolean
        default: false

concurrency:
  group: update-voting-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      FULL_HISTORY: ${{ github.event.inputs.full_history == 'true' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore raw data cache
        id: raw-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw
            data/state/national
            data/andalucia/raw
            data/andalucia/votos_*_raw.json
            data/andalucia/parse_state.json
            data/cyl/raw
            data/cyl/votos_*_raw.json
            data/cyl/parse_state.json
            data/madrid/raw
            data/madrid/votos_*_raw.json
            data/madrid/parse_state.json
          key: parliament-raw-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            parliament-raw-${{ runner.os }}-${{ github.ref_name }}-
            parliament-raw-${{ runner.os }}-
            congress-raw-

      - name: Restore raw snapshot from R2 (fallback)
        if: steps.raw-cache.outputs.cache-hit != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS: ${{ secrets.CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS:-}" ]; then
            echo "Skipping raw R2 restore because required secrets are missing."
            exit 0
          fi

          KEY="raw-snapshots/${GITHUB_REF_NAME}/latest.tar.gz"
          TMP_FILE="/tmp/loquevotan-raw-latest.tar.gz"
          if npx wrangler r2 object get "${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS}/${KEY}" --file "${TMP_FILE}" --remote; then
            tar -xzf "${TMP_FILE}" -C .
            echo "Restored raw snapshot from R2: ${KEY}"
          else
            echo "No raw snapshot found in R2 at ${KEY}; continuing without fallback."
          fi

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pdfplumber google-genai aiohttp aiofiles

      - name: Run National scraper
        run: |
          if [ "${FULL_HISTORY}" = "true" ]; then
            python scripts/scraper.py
          else
            python scripts/scraper.py --legislatura XV
          fi

      - name: Run National transformer
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY not found, running with --skip-ai"
            python scripts/transform.py --skip-ai
          else
            python scripts/transform.py
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Andalusia update
        run: |
          if [ "${FULL_HISTORY}" = "true" ]; then
            python scripts/andalucia/run_update.py
          else
            python scripts/andalucia/run_update.py --active-only
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run CyL update
        run: |
          if [ "${FULL_HISTORY}" = "true" ]; then
            python scripts/cyl/run_update.py
          else
            python scripts/cyl/run_update.py --active-only
          fi

      - name: Run Madrid update
        run: |
          if [ "${FULL_HISTORY}" = "true" ]; then
            python scripts/madrid/run_update.py
          else
            python scripts/madrid/run_update.py --active-only
          fi

      - name: Generate Madrid QA report
        run: |
          node scripts/qa/report_madrid_quality.mjs \
            --markdown-out artifacts/madrid-quality.md \
            --json-out artifacts/madrid-quality.json

      - name: Upload Madrid QA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: madrid-quality-report-${{ github.run_id }}
          path: |
            artifacts/madrid-quality.md
            artifacts/madrid-quality.json
          if-no-files-found: error

      - name: Build global index
        run: |
          if [ -f scripts/build_global_index.py ]; then
            python scripts/build_global_index.py
          fi

      - name: Generate data diff summary
        run: node scripts/qa/summarize_update_diff.mjs

      - name: Detect changed scopes for Cloudflare D1 sync
        id: detect-scopes
        run: node scripts/cloudflare/detect_changed_scopes.mjs

      - name: Save raw data cache
        if: always() && !cancelled()
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw
            data/state/national
            data/andalucia/raw
            data/andalucia/votos_*_raw.json
            data/andalucia/parse_state.json
            data/cyl/raw
            data/cyl/votos_*_raw.json
            data/cyl/parse_state.json
            data/madrid/raw
            data/madrid/votos_*_raw.json
            data/madrid/parse_state.json
          key: ${{ steps.raw-cache.outputs.cache-primary-key || format('parliament-raw-{0}-{1}-{2}', runner.os, github.ref_name, github.run_id) }}

      - name: Upload raw snapshot to R2 (if configured)
        if: always() && !cancelled()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS: ${{ secrets.CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS:-}" ]; then
            echo "Skipping raw snapshot upload because required secrets are missing."
            exit 0
          fi

          shopt -s nullglob
          SNAP_FILE="/tmp/loquevotan-raw-snapshot.tar.gz"
          INCLUDE_PATHS=(
            data/raw
            data/state/national
            data/andalucia/raw
            data/cyl/raw
            data/madrid/raw
            data/andalucia/parse_state.json
            data/cyl/parse_state.json
            data/madrid/parse_state.json
          )
          INCLUDE_PATHS+=(data/andalucia/votos_*_raw.json)
          INCLUDE_PATHS+=(data/cyl/votos_*_raw.json)
          INCLUDE_PATHS+=(data/madrid/votos_*_raw.json)
          EXISTING_PATHS=()
          for p in "${INCLUDE_PATHS[@]}"; do
            if [ -e "${p}" ]; then
              EXISTING_PATHS+=("${p}")
            fi
          done
          if [ "${#EXISTING_PATHS[@]}" -eq 0 ]; then
            echo "No raw files found to snapshot."
            exit 0
          fi

          tar -czf "${SNAP_FILE}" "${EXISTING_PATHS[@]}"
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          PREFIX="raw-snapshots/${GITHUB_REF_NAME}"
          VERSIONED_KEY="${PREFIX}/${TS}-${SHA_SHORT}.tar.gz"
          LATEST_KEY="${PREFIX}/latest.tar.gz"

          npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS}/${VERSIONED_KEY}" --file "${SNAP_FILE}" --remote
          npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS}/${LATEST_KEY}" --file "${SNAP_FILE}" --remote
          echo "Raw snapshot uploaded to R2:"
          echo "- ${VERSIONED_KEY}"
          echo "- ${LATEST_KEY}"

      - name: Commit and push if changed
        id: commit-data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git add -A public/data/ public/data/ambitos.json
          [ -f data/cache_categorias.json ] && git add data/cache_categorias.json || true
          [ -f data/andalucia/cache_categorias.json ] && git add data/andalucia/cache_categorias.json || true
          [ -f data/cyl/cache_categorias.json ] && git add data/cyl/cache_categorias.json || true
          [ -f data/madrid/cache_categorias.json ] && git add data/madrid/cache_categorias.json || true
          git add data/state/national/last_fetch_*.txt || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: update voting data (National + Andalusia + CyL + Madrid) $(date +%Y-%m-%d)"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          pushed=0
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              pushed=1
              break
            fi
            git rebase --abort || true
            if [ "${attempt}" -lt 3 ]; then
              echo "Push attempt ${attempt} failed, retrying..."
              sleep 5
            fi
          done

          if [ "${pushed}" -ne 1 ]; then
            echo "Failed to push after 3 attempts."
            exit 1
          fi

      - name: Trigger scoped Cloudflare Data Sync
        if: steps.commit-data.outputs.pushed == 'true' && steps.detect-scopes.outputs.has_scope_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SCOPES: ${{ steps.detect-scopes.outputs.scope_csv }}
        run: |
          set -euo pipefail
          echo "Triggering Cloudflare Data Sync for scopes: ${SCOPES}"
          gh api "repos/${{ github.repository }}/actions/workflows/cloudflare-data-sync.yml/dispatches" \
            -X POST \
            -f ref=main \
            -f "inputs[scopes]=${SCOPES}"
