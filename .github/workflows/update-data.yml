name: Update Voting Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch:

concurrency:
  group: update-voting-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore raw data cache
        id: raw-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw
            data/andalucia/raw
            data/andalucia/votos_*_raw.json
            data/andalucia/parse_state.json
            data/cyl/raw
            data/cyl/votos_*_raw.json
            data/cyl/parse_state.json
            data/madrid/raw
            data/madrid/votos_*_raw.json
            data/madrid/parse_state.json
          key: parliament-raw-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            parliament-raw-${{ runner.os }}-${{ github.ref_name }}-
            parliament-raw-${{ runner.os }}-
            congress-raw-

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pdfplumber google-genai aiohttp aiofiles

      - name: Run National scraper
        run: python scripts/scraper.py

      - name: Run National transformer
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY not found, running with --skip-ai"
            python scripts/transform.py --skip-ai
          else
            python scripts/transform.py
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Andalusia update
        run: python scripts/andalucia/run_update.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run CyL update
        run: python scripts/cyl/run_update.py

      - name: Run Madrid update
        run: python scripts/madrid/run_update.py

      - name: Build global index
        run: |
          if [ -f scripts/build_global_index.py ]; then
            python scripts/build_global_index.py
          fi

      - name: Save raw data cache
        if: always() && !cancelled()
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw
            data/andalucia/raw
            data/andalucia/votos_*_raw.json
            data/andalucia/parse_state.json
            data/cyl/raw
            data/cyl/votos_*_raw.json
            data/cyl/parse_state.json
            data/madrid/raw
            data/madrid/votos_*_raw.json
            data/madrid/parse_state.json
          key: ${{ steps.raw-cache.outputs.cache-primary-key || format('parliament-raw-{0}-{1}-{2}', runner.os, github.ref_name, github.run_id) }}

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git add -A public/data/ public/data/ambitos.json
          [ -f data/cache_categorias.json ] && git add data/cache_categorias.json || true
          [ -f data/andalucia/cache_categorias.json ] && git add data/andalucia/cache_categorias.json || true
          [ -f data/cyl/cache_categorias.json ] && git add data/cyl/cache_categorias.json || true
          [ -f data/madrid/cache_categorias.json ] && git add data/madrid/cache_categorias.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update voting data (National + Andalusia + CyL + Madrid) $(date +%Y-%m-%d)"

          pushed=0
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              pushed=1
              break
            fi
            git rebase --abort || true
            if [ "${attempt}" -lt 3 ]; then
              echo "Push attempt ${attempt} failed, retrying..."
              sleep 5
            fi
          done

          if [ "${pushed}" -ne 1 ]; then
            echo "Failed to push after 3 attempts."
            exit 1
          fi
