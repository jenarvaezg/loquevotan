name: Update Voting Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore raw data cache
        uses: actions/cache@v4
        with:
          path: data/raw
          key: congress-raw-${{ github.run_id }}
          restore-keys: congress-raw-

      - name: Install gemini-cli
        run: npm install -g @anthropic-ai/gemini-cli || npm install -g gemini-cli || echo "gemini-cli not available, using --skip-ai"

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Run transformer
        run: |
          if command -v gemini &> /dev/null; then
            python scripts/transform.py
          else
            echo "gemini-cli not found, running with --skip-ai"
            python scripts/transform.py --skip-ai
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/votaciones.json data/cache_categorias.json
          git diff --staged --quiet || git commit -m "chore: update voting data $(date +%Y-%m-%d)"
          git push
