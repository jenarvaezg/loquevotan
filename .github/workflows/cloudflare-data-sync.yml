name: Cloudflare Data Sync

on:
  schedule:
    - cron: "30 8 * * 1" # Every Monday at 08:30 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-data-sync
  cancel-in-progress: false

jobs:
  sync-d1:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build D1 seed SQL snapshot
        run: node scripts/cloudflare/build_d1_seed.mjs --out /tmp/loquevotan-d1-seed.sql

      - name: Upload seed artifact
        uses: actions/upload-artifact@v4
        with:
          name: loquevotan-d1-seed-sql
          path: /tmp/loquevotan-d1-seed.sql
          retention-days: 7

      - name: Apply schema to D1
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_D1_DATABASE_NAME != '' }}
        run: npx wrangler d1 execute "${{ secrets.CLOUDFLARE_D1_DATABASE_NAME }}" --remote --file cloudflare/d1/schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply snapshot to D1
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_D1_DATABASE_NAME != '' }}
        run: npx wrangler d1 execute "${{ secrets.CLOUDFLARE_D1_DATABASE_NAME }}" --remote --file /tmp/loquevotan-d1-seed.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Skip remote D1 apply (missing secrets)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' || secrets.CLOUDFLARE_D1_DATABASE_NAME == '' }}
        run: |
          echo "Skipping remote D1 sync because at least one secret is missing:"
          echo "- CLOUDFLARE_API_TOKEN"
          echo "- CLOUDFLARE_ACCOUNT_ID"
          echo "- CLOUDFLARE_D1_DATABASE_NAME"
