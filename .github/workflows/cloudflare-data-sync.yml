name: Cloudflare Data Sync

on:
  schedule:
    - cron: "30 8 * * 1" # Every Monday at 08:30 UTC
  workflow_dispatch:
    inputs:
      scopes:
        description: "Ámbitos a sincronizar (coma separada). Ej: nacional,cyl,andalucia"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-data-sync
  cancel-in-progress: false

jobs:
  sync-d1:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_NAME: ${{ secrets.CLOUDFLARE_D1_DATABASE_NAME }}
      CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS: ${{ secrets.CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS }}
      SYNC_SCOPES: ${{ github.event.inputs.scopes || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build D1 seed SQL snapshot
        run: |
          set -euo pipefail
          if [ -n "${SYNC_SCOPES:-}" ]; then
            echo "Building scoped D1 seed for: ${SYNC_SCOPES}"
            node scripts/cloudflare/build_d1_seed.mjs --out /tmp/loquevotan-d1-seed.sql --scopes "${SYNC_SCOPES}"
          else
            echo "Building full D1 seed"
            node scripts/cloudflare/build_d1_seed.mjs --out /tmp/loquevotan-d1-seed.sql
          fi

      - name: Upload seed artifact
        uses: actions/upload-artifact@v4
        with:
          name: loquevotan-d1-seed-sql
          path: /tmp/loquevotan-d1-seed.sql
          retention-days: 7

      - name: Compress seed snapshot
        run: gzip -9 -c /tmp/loquevotan-d1-seed.sql > /tmp/loquevotan-d1-seed.sql.gz

      - name: Upload compressed snapshot to R2 (if configured)
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS:-}" ]; then
            echo "Skipping R2 snapshot upload because at least one secret is missing:"
            echo "- CLOUDFLARE_API_TOKEN"
            echo "- CLOUDFLARE_ACCOUNT_ID"
            echo "- CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS"
            exit 0
          fi

          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          KEY="d1-seeds/${TS}-${SHA_SHORT}.sql.gz"
          npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS}/${KEY}" --file /tmp/loquevotan-d1-seed.sql.gz
          echo "Snapshot uploaded to R2: ${CLOUDFLARE_R2_BUCKET_DATA_SNAPSHOTS}/${KEY}"

      - name: Apply schema and snapshot to D1 (if configured)
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_D1_DATABASE_NAME:-}" ]; then
            echo "Skipping remote D1 sync because at least one secret is missing:"
            echo "- CLOUDFLARE_API_TOKEN"
            echo "- CLOUDFLARE_ACCOUNT_ID"
            echo "- CLOUDFLARE_D1_DATABASE_NAME"
            exit 0
          fi

          npx wrangler d1 execute "${CLOUDFLARE_D1_DATABASE_NAME}" --remote --file cloudflare/d1/schema.sql
          npx wrangler d1 execute "${CLOUDFLARE_D1_DATABASE_NAME}" --remote --file /tmp/loquevotan-d1-seed.sql
